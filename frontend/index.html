<!DOCTYPE html>
<html>
<head>
    <title>Simple Q&A Chatbot</title>
    <style>
        .loading { color: blue; font-weight: bold; }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h3>Question:</h3>

<textarea id="textbox" rows="4" cols="50"></textarea><br><br>

<div class="controls">
    <button id="recordBtn" onclick="toggleRecording()">Start Recording</button>
    <span id="status">Status: ...</span>
</div>
<button id="sendBtn" onclick="sendText()">Send</button>

<h3>Answer:</h3>
<div id="answer" style="border: 1px solid #ccc; padding: 10px; min-height: 20px; width: 400px; background: #f9f9f9;">
    The answer will appear here...
</div>
